<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Thumbnail Downloader - Download HD Thumbnails Free</title>
    <meta name="description" content="Download high-quality YouTube video thumbnails instantly. Paste your link and save images in HD.">
    <meta name="keywords" content="YouTube Thumbnail Downloader, HD Thumbnail, Abubakar Khan, Typing Master Pro">

    <style>
        :root { --main: #ff9f43; --accent: #00d2d3; --bg: #0a0e17; --card: #161d2b; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; text-align: center; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0a0e17 100%);
        }
        
        /* User Name Header */
        .user-header { background: rgba(0, 210, 211, 0.1); padding: 10px; font-weight: bold; color: var(--accent); border-bottom: 1px solid var(--accent); letter-spacing: 1px; }

        /* Progress Bar */
        #progress-container { width: 100%; height: 5px; background: #222; position: fixed; top: 0; left: 0; z-index: 100; }
        #progress-bar { height: 100%; background: var(--main); width: 0%; transition: 0.3s; box-shadow: 0 0 10px var(--main); }

        /* Home Screen */
        #home-screen { padding: 40px 20px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 15px; max-width: 1100px; margin: 30px auto; }
        .level-box { background: var(--card); padding: 25px 10px; border-radius: 15px; cursor: pointer; border: 2px solid #2d3748; transition: 0.4s; color: #718096; }
        .unlocked { opacity: 1; border-color: var(--accent); color: var(--accent); }
        .unlocked:hover { transform: translateY(-8px); background: var(--accent); color: #000; box-shadow: 0 10px 20px rgba(0, 210, 211, 0.3); }

        /* Game Screen */
        #game-screen { display: none; padding-top: 20px; }
        .stats-bar { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; background: var(--card); padding: 15px; width: fit-content; margin-inline: auto; border-radius: 50px; border: 1px solid #2d3748; }
        .stat-item { font-weight: bold; font-size: 18px; color: var(--accent); }
        
        #text-display { 
            font-size: 34px; font-family: 'Courier New', monospace; background: rgba(255,255,255,0.03); 
            padding: 40px; border-radius: 25px; max-width: 900px; margin: 20px auto; 
            text-align: left; line-height: 1.7; border: 1px dashed #2d3748;
        }
        .correct { color: #55efc4; text-shadow: 0 0 10px rgba(85, 239, 196, 0.5); }
        .incorrect { color: #ff7675; background: rgba(255, 118, 117, 0.1); border-radius: 4px; }
        .current { border-bottom: 4px solid var(--main); background: rgba(255, 159, 67, 0.1); }

        /* Keyboard UI */
        .keyboard { display: inline-grid; grid-template-columns: repeat(10, 65px); gap: 12px; margin-top: 30px; background: #000; padding: 25px; border-radius: 20px; border: 5px solid #1a202c; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .key { width: 65px; height: 65px; background: #2d3748; border-radius: 10px; line-height: 65px; font-weight: bold; font-size: 20px; color: #a0aec0; }
        .active-key { background: var(--main) !important; color: #000; transform: scale(1.1) translateY(5px); box-shadow: 0 0 25px var(--main); }

        input { position: absolute; opacity: 0; pointer-events: none; }
        .btn-exit { background: #d63031; color: white; border: none; padding: 12px 35px; border-radius: 12px; cursor: pointer; margin-top: 20px; font-weight: bold; }

        /* Winner Screen */
        .winner-content { text-align:center; padding-top:80px; background: var(--bg); height:100vh; position: fixed; top:0; left:0; width:100%; z-index: 1000; display: none; }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div class="user-header">DESIGNED BY ABUBAKAR KHAN</div>

    <div id="home-screen">
        <h1 style="color: var(--main); font-size: 45px; margin-top: 10px;">YouTube Thumbnail Downloader</h1>
        <p style="color: #718096;">Laptop Edition | Unlock All 100 Levels</p>
        <div class="level-grid" id="levelsGrid"></div>
    </div>

    <div id="game-screen">
        <div class="stats-bar">
            <div class="stat-item">LVL: <span id="lvlNum">1</span></div>
            <div class="stat-item">SPEED: <span id="wpmDisplay">0</span> WPM</div>
            <div class="stat-item">ACC: <span id="accDisplay">100</span>%</div>
        </div>
        <div id="text-display"></div>
        <input type="text" id="hidden-input" autofocus autocomplete="off">
        
        <div class="keyboard">
            <div class="key" id="k-q">Q</div><div class="key" id="k-w">W</div><div class="key" id="k-e">E</div><div class="key" id="k-r">R</div><div class="key" id="k-t">T</div>
            <div class="key" id="k-y">Y</div><div class="key" id="k-u">U</div><div class="key" id="k-i">I</div><div class="key" id="k-o">O</div><div class="key" id="k-p">P</div>
            <div class="key" id="k-a">A</div><div class="key" id="k-s">S</div><div class="key" id="k-d">D</div><div class="key" id="k-f">F</div><div class="key" id="k-g">G</div>
            <div class="key" id="k-h">H</div><div class="key" id="k-j">J</div><div class="key" id="k-k">K</div><div class="key" id="k-l">L</div><div class="key" id="k-;">;</div>
        </div>
        <br>
        <button class="btn-exit" onclick="location.reload()">EXIT GAME</button>
    </div>

    <div id="winner-screen" class="winner-content">
        <img src="https://img.icons8.com/emoji/160/000000/trophy-emoji.png" style="width:200px; animation: bounce 2s infinite;">
        <h1 style="color:gold; font-size:55px;">مبارک شه ابوبکر خانه!</h1>
        <p style="color:white; font-size:24px;">ته اوس د نړۍ تر ټولو تېز ټایپیسټ شوې!</p>
        <button onclick="location.reload()" style="background:var(--accent); border:none; padding:15px 45px; border-radius:12px; font-weight:bold; cursor:pointer; font-size:18px; margin-top:20px;">بیا لوبېدل</button>
    </div>

    <script>
        const grid = document.getElementById('levelsGrid');
        const display = document.getElementById('text-display');
        const input = document.getElementById('hidden-input');
        const pBar = document.getElementById('progress-bar');
        
        let unlocked = parseInt(localStorage.getItem('abubakarLegendLvl')) || 1;
        let activeLvl = 1;
        let startTime = null;

        const levelData = {
            1: "f f f j j j fj fj ff jj f j f j ffjj ffjj fjfj jfjf fj fj fj f j f",
            2: "d d d k k k dk dk dd kk d k d k ddkk ddkk dkdk kdkd dk dk dk d k d",
            3: "the quick brown fox jumps over the lazy dog very fast indeed abubakar",
            4: "practice typing everyday to become a master of the keyboard layout pro",
            5: "abubakar is learning graphic design and python programming in acode app"
        };

        for(let i=6; i<=100; i++) {
            levelData[i] = "this is level " + i + " typing challenge for computer mastery on laptop screen daily practice is the key to success by abubakar khan";
        }

        function init() {
            grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const box = document.createElement('div');
                box.innerHTML = i + (i < unlocked ? '<br><small>✅</small>' : '');
                box.className = `level-box ${i <= unlocked ? 'unlocked' : ''}`;
                if(i <= unlocked) box.onclick = () => start(i);
                grid.appendChild(box);
            }
        }

        function start(id) {
            activeLvl = id;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('lvlNum').innerText = id;
            let txt = levelData[id];
            display.innerHTML = txt.split('').map((c, i) => `<span class="${i===0?'current':''}">${c}</span>`).join('');
            input.value = ''; startTime = null;
            pBar.style.width = '0%';
            input.focus();
            highlight(txt[0]);
        }

        function highlight(c) {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active-key'));
            const k = document.getElementById('k-' + c.toLowerCase());
            if(k) k.classList.add('active-key');
        }

        input.addEventListener('input', () => {
            if (!startTime) startTime = new Date();
            const spans = display.querySelectorAll('span');
            const typed = input.value.split('');
            let errors = 0;
            
            spans.forEach((s, i) => {
                s.classList.remove('correct', 'incorrect', 'current');
                if(i === typed.length) {
                    s.classList.add('current');
                    highlight(s.innerText);
                }
                if(typed[i] != null) {
                    if(typed[i] === s.innerText) s.classList.add('correct');
                    else { s.classList.add('incorrect'); errors++; }
                }
            });

            pBar.style.width = (typed.length / spans.length * 100) + "%";
            document.getElementById('accDisplay').innerText = Math.round(((typed.length - errors) / typed.length) * 100) || 100;
            let wpm = Math.round((typed.length / 5) / ((new Date() - startTime) / 60000));
            document.getElementById('wpmDisplay').innerText = wpm > 0 ? wpm : 0;

            if(typed.length === spans.length) {
                setTimeout(() => {
                    if(activeLvl === 100) {
                        document.getElementById('game-screen').style.display = 'none';
                        document.getElementById('winner-screen').style.display = 'block';
                    } else {
                        if(activeLvl >= unlocked) {
                            unlocked = activeLvl + 1;
                            localStorage.setItem('abubakarLegendLvl', unlocked);
                        }
                        location.reload();
                    }
                }, 300);
            }
        });

        init();
    </script>
</body>
</html>
