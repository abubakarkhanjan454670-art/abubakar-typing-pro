<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast YT Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: #1e293b; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 10px; text-align: left; outline: none; }
        .btn-find { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; display: none; }
        #thumbImg { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .btn-download { display: block; width: 100%; padding: 12px; background: #22c55e; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>ټایمبنیل ډاونلوډر</h2>
    <input type="text" id="videoUrl" placeholder="لېنک دلته پیسټ کړه...">
    <button class="btn-find" onclick="getThumbnail()">عکس پیدا کړه</button>

    <div id="result">
        <img id="thumbImg" src="">
        <button class="btn-download" onclick="forceDownload()">مستقیم ډاونلوډ (ګالري)</button>
    </div>
</div>

<script>
    let imgUrl = "";

    function getThumbnail() {
        let url = document.getElementById('videoUrl').value;
        let videoId = "";
        
        if(url.includes("v=")) {
            videoId = url.split("v=")[1].substring(0, 11);
        } else if(url.includes("youtu.be/")) {
            videoId = url.split("youtu.be/")[1].substring(0, 11);
        }

        if(videoId != "") {
            imgUrl = "https://img.youtube.com/vi/" + videoId + "/maxresdefault.jpg";
            document.getElementById('thumbImg').src = imgUrl;
            document.getElementById('result').style.display = "block";
        } else {
            alert("صحیح لېنک پیسټ کړه!");
        }
    }

    // دا فنکشن عکس په چټکۍ سره ډاونلوډوي
    function forceDownload() {
        var fileName = 'abubakar_yt_thumb.jpg';
        var xhr = new XMLHttpRequest();
        xhr.open("GET", imgUrl, true);
        xhr.responseType = "blob";
        xhr.onload = function(){
            var urlCreator = window.URL || window.webkitURL;
            var imageUrl = urlCreator.createObjectURL(this.response);
            var tag = document.createElement('a');
            tag.href = imageUrl;
            tag.download = fileName;
            document.body.appendChild(tag);
            tag.click();
            document.body.removeChild(tag);
        };
        xhr.send();
    }
</script>

</body>
</html>
