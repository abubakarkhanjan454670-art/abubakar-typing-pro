<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abubakar Pro Laptop Typing</title>
    <style>
        :root { --main: #00ffcc; --bg: #0f172a; --card: #1e293b; --wrong: #ff4757; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* هوم سکرین */
        .header { background: var(--card); padding: 20px; border-bottom: 3px solid var(--main); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; padding: 40px; max-width: 1100px; margin: auto; }
        .level-box { background: var(--card); padding: 25px 10px; border-radius: 15px; cursor: pointer; border: 1px solid #334155; transition: 0.3s; font-size: 22px; opacity: 0.4; font-weight: bold; }
        .unlocked { opacity: 1; background: #fff; color: #000; border: none; box-shadow: 0 0 20px var(--main); }
        .unlocked:hover { transform: scale(1.1); }

        /* د لوبې سکرین */
        #game-screen { display: none; padding-top: 40px; text-align: center; }
        .stats-container { background: var(--card); display: inline-flex; gap: 40px; padding: 15px 40px; border-radius: 50px; margin-bottom: 30px; border: 2px solid var(--main); }
        .stat-box { font-size: 24px; font-weight: bold; color: var(--main); }

        #text-display { 
            font-size: 38px; line-height: 1.6; max-width: 900px; margin: 20px auto; 
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px;
            color: #64748b; font-family: 'Courier New', monospace; text-align: left;
        }
        .correct { color: #22c55e; text-shadow: 0 0 10px #22c55e; }
        .incorrect { color: var(--wrong); background: rgba(255, 71, 87, 0.2); }
        .current { border-bottom: 4px solid var(--main); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        /* لېپ ټاپ کیبورډ */
        .keyboard { display: inline-grid; grid-template-columns: repeat(10, 60px); gap: 8px; margin-top: 30px; background: #111; padding: 20px; border-radius: 15px; border: 5px solid #222; }
        .key { width: 60px; height: 60px; background: #334155; border-radius: 8px; line-height: 60px; font-weight: bold; font-size: 20px; color: #94a3b8; }
        .active-key { background: var(--main) !important; color: #000; transform: translateY(4px); box-shadow: 0 0 20px var(--main); }

        input { position: absolute; opacity: 0; pointer-events: none; }
        .btn-exit { margin-top: 30px; background: #ef4444; color: white; border: none; padding: 12px 35px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

    <div id="home-screen">
        <div class="header">
            <h1>ABUBAKAR TYPING MASTER PRO</h1>
            <p>100 Levels Challenge | Progress Saved</p>
        </div>
        <div class="level-grid" id="levelsContainer"></div>
    </div>

    <div id="game-screen">
        <div class="stats-container">
            <div class="stat-box">LEVEL: <span id="lvlDisplay">1</span></div>
            <div class="stat-box">SPEED: <span id="wpm">0</span> WPM</div>
            <div class="stat-box">ACCURACY: <span id="acc">100</span>%</div>
        </div>

        <div id="text-display"></div>
        <input type="text" id="hidden-input" autofocus autocomplete="off">
        
        <div class="keyboard" id="kb">
            <div class="key" id="k-q">Q</div><div class="key" id="k-w">W</div><div class="key" id="k-e">E</div><div class="key" id="k-r">R</div><div class="key" id="k-t">T</div>
            <div class="key" id="k-y">Y</div><div class="key" id="k-u">U</div><div class="key" id="k-i">I</div><div class="key" id="k-o">O</div><div class="key" id="k-p">P</div>
            <div class="key" id="k-a">A</div><div class="key" id="k-s">S</div><div class="key" id="k-d">D</div><div class="key" id="k-f">F</div><div class="key" id="k-g">G</div>
            <div class="key" id="k-h">H</div><div class="key" id="k-j">J</div><div class="key" id="k-k">K</div><div class="key" id="k-l">L</div><div class="key" id="k-;">;</div>
        </div>
        <br>
        <button class="btn-exit" onclick="location.reload()">EXIT LESSON</button>
    </div>

    <script>
        const container = document.getElementById('levelsContainer');
        const display = document.getElementById('text-display');
        const input = document.getElementById('hidden-input');
        
        let savedLevel = parseInt(localStorage.getItem('abubakarProLvl')) || 1;
        let currentLvlId = 1;
        let startTime;

        // د لېولونو ډېټا (هر لېول کې ۲۰+ ټکي)
        const charSets = ["fj", "dk", "sl", "a;", "asdf", "jkl;", "gh", "ru", "ei", "wo", "qp"];

        function generateLevelText(id) {
            let set = charSets[Math.floor((id-1)/10) % charSets.length];
            let text = "";
            for(let i=0; i<22; i++) { // دلته مې ۲۲ لغتونه پوره کړل
                let word = "";
                for(let j=0; j<4; j++) word += set[Math.floor(Math.random()*set.length)];
                text += word + " ";
            }
            return text.trim();
        }

        function drawHome() {
            container.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const div = document.createElement('div');
                div.innerText = i;
                div.className = `level-box ${i <= savedLevel ? 'unlocked' : ''}`;
                if(i <= savedLevel) div.onclick = () => startLevel(i);
                container.appendChild(div);
            }
        }

        function startLevel(id) {
            currentLvlId = id;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('lvlDisplay').innerText = id;
            
            let levelText = generateLevelText(id);
            display.innerHTML = levelText.split('').map(char => `<span>${char}</span>`).join('');
            input.value = '';
            startTime = null;
            highlightKey(levelText[0]);
        }

        function highlightKey(char) {
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active-key'));
            const keyNode = document.getElementById(`k-${char.toLowerCase()}`);
            if(keyNode) keyNode.classList.add('active-key');
        }

        input.addEventListener('input', () => {
            if(!startTime) startTime = Date.now();
            const spans = display.querySelectorAll('span');
            const val = input.value.split('');
            let errors = 0;

            spans.forEach((span, i) => {
                const char = val[i];
                span.classList.remove('correct', 'incorrect', 'current');
                if(char == null) {
                    if(i === val.length) {
                        span.classList.add('current');
                        highlightKey(span.innerText);
                    }
                } else if(char === span.innerText) {
                    span.classList.add('correct');
                } else {
                    span.classList.add('incorrect');
                    errors++;
                }
            });

            // سپېډ حسابول
            let minutes = (Date.now() - startTime) / 60000;
            document.getElementById('wpm').innerText = Math.round((val.length / 5) / minutes) || 0;
            document.getElementById('acc').innerText = Math.round(((val.length - errors) / val.length) * 100) || 100;

            if(val.length === spans.length && errors === 0) {
                setTimeout(() => {
                    alert("🏆 لېول پوره شو! اوس بل لېول ته لاړ شه.");
                    if(currentLvlId >= savedLevel) localStorage.setItem('abubakarProLvl', currentLvlId + 1);
                    location.reload();
                }, 200);
            }
        });

        drawHome();
    </script>
</body>
</html>
